name: CI

on:
  push:
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck when shell scripts exist
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' files < <(find . -type f \( -name '*.sh' -o -name '*.bash' \) -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No shell scripts found; skipping shellcheck."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck "${files[@]}"
