name: Publish Skills

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - ".github/workflows/publish-skills.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      tiles: ${{ steps.collect.outputs.tiles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changed tiles
        id: collect
        run: |
          set -euo pipefail

          all_tiles_json() {
            find skills -mindepth 1 -maxdepth 1 -type d | sort | jq -Rsc 'split("\n") | map(select(length > 0))'
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tiles_json="$(all_tiles_json)"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- skills .github/workflows/publish-skills.yml)"

            if printf '%s\n' "$changed_files" | grep -qx '.github/workflows/publish-skills.yml'; then
              tiles_json="$(all_tiles_json)"
            else
              tiles_json="$(
                printf '%s\n' "$changed_files" \
                  | grep '^skills/' \
                  | cut -d/ -f1-2 \
                  | sort -u \
                  | jq -Rsc 'split("\n") | map(select(length > 0))'
              )"
            fi
          fi

          echo "tiles=$tiles_json" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ needs.discover.outputs.tiles != '[]' }}
    env:
      TESSL_THRESHOLD: "90"
    strategy:
      fail-fast: false
      matrix:
        tile: ${{ fromJson(needs.discover.outputs.tiles) }}
    defaults:
      run:
        working-directory: ${{ matrix.tile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Tessl
        uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Review skill
        run: tessl skill review --threshold "$TESSL_THRESHOLD" .

      - name: Lint tile
        run: tessl tile lint

      - name: Publish tile
        run: tessl tile publish --bump patch
