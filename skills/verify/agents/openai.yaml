interface:
  display_name: "Verify"
  short_description: "Verify your own changes on real surfaces using the existing infrastructure"
  default_prompt: |
    Use $verify.

    Goal: self-check your own completed change before independent review.

    Success criteria:
    - The changed behavior has the strongest practical guardrail or runtime evidence available.
    - Real-surface checks are used when the repo supports them.
    - Obvious self-correctable issues found during verification are fixed.
    - The verdict is exactly one of: ready for review, needs more work, blocked.

    Constraints:
    - Report readiness for review; ship decisions are out of scope.
    - Reviews of someone else's code are out of scope.
    - Mark checks that could not run as unverified or blocked.

    Output: no conversational opener. Use bullet labels only: verdict, evidence, fixed during verify when any, unverified gaps, and next. Summarize passing commands by intent/result instead of printing full command strings; include full commands only for failures, reproduction, or when asked.

    Stop rules: report blocked when the repo cannot be booted or exercised reliably; otherwise name the best check run and any gap.
