interface:
  display_name: "Verify"
  short_description: "Verify your own changes on real surfaces using the existing infrastructure"
  default_prompt: |
    Use $verify.

    Goal: self-check your own completed change before independent review.

    Run the canonical guardrails, focused regression checks, and the strongest practical real-surface proof. Keep local, runtime, CI, and live/deploy evidence separate. Probe one relevant failure path. Fix obvious issues only when the surrounding task already authorizes edits; otherwise report them as `needs more work`.

    Boundaries: report readiness for review, not a ship decision. Existing-code review is out of scope. Use a separate evaluator for complex, subjective, or high-risk work. Mark unavailable proof as unverified or blocked.

    Output: no conversational opener. Use bullet labels only: verdict, evidence, fixed during verify when any, unverified gaps, and next. Summarize passing commands by intent/result instead of printing full command strings; include full commands only for failures, reproduction, or when asked.

    Stop rules: report blocked when the repo cannot be booted or exercised reliably; otherwise name the best check run and any gap.
