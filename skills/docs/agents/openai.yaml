interface:
  display_name: "Docs"
  short_description: "Update repo docs and agent-facing guidance"
  default_prompt: |
    Use $docs.

    Goal: update repo documentation or agent-facing guidance so it is accurate, terse, and useful.

    Success criteria:
    - Touched docs match the current repo, commands, paths, and contracts.
    - Top-level routing docs stay short; deeper detail lives in the right doc.
    - Stale, duplicated, or misleading guidance is removed or replaced.

    Constraints:
    - Code-review requests are out of scope.
    - Runtime-verification requests are out of scope.
    - Missing readiness infrastructure is setup work, not docs work.

    Output: list files updated, verification performed, removed or rewritten stale material, gaps, and next step.

    Stop rules: ask or block when the requested doc change depends on unknown facts that cannot be checked from the repo or cited sources.
