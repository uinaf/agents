interface:
  display_name: "Deploy Pipeline"
  short_description: "Standardize GitHub Actions deploy flow"
  default_prompt: |
    Use $gh-deploy-pipeline.

    Goal: align this repo's GitHub Actions deploy flow around verify-then-deploy for running apps.

    Success criteria:
    - Changes are detected per deploy lane.
    - Verify builds one artifact, e2e consumes that artifact, deploy ships that same artifact.
    - Deploy jobs serialize per environment and lane, then smoke-check the deployed URL or health endpoint.
    - Existing repo or sibling-host patterns are preserved unless evidence shows they are wrong.

    Constraints:
    - Use this for deployed services or apps, not package releases; use $gh-release-pipeline for publishing versioned artifacts.
    - Keep secrets in secret stores and reference them from workflow YAML.
    - Deploy the already verified artifact or image.

    Output: no conversational opener. Use bullet labels only: files changed, targets, evidence, risks, remaining setup, and next. Summarize passing validation by intent/result instead of printing full command strings; include full commands only for failures, reproduction, or when asked.

    Stop rules: block when deploy credentials, host target, or lane ownership cannot be confirmed safely.
